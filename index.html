<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pax Vatikan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🌍 Pax Vatikan</h1>
<div id="turn">Tur : 1</div>
</header>

<div id="game">

<div id="map">

<div class="country italy" onclick="selectCountry('İtalya')">
İtalya
</div>

<div class="country france" onclick="selectCountry('Fransa')">
Fransa
</div>

<div class="country germany" onclick="selectCountry('Almanya')">
Almanya
</div>

<div class="country austria" onclick="selectCountry('Avusturya')">
Avusturya
</div>

<div class="country russia" onclick="selectCountry('Rusya')">
Rusya
</div>

<div class="country uk" onclick="selectCountry('Birleşik Krallık')">
BK
</div>

<div class="country serbia" onclick="selectCountry('Sırbistan')">
Sırbistan
</div>

<div id="vatican"
onclick="selectCountry('Vatikan')">
✝
</div>

</div>

<div id="panel">

<h2>Vatikan</h2>

<p>💰 Altın :
<span id="gold">25</span>M</p>

<p>⭐ Nüfuz :
<span id="power">95</span></p>

<p id="info">

Avrupa savaşa hazırlanıyor...

</p>

<button onclick="nextTurn()">

Sonraki Tur

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
