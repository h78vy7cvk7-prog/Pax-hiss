<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pax Vatikan</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header id="topbar">

<div class="logo">
🌍 <span>Pax Vatikan</span>
</div>

<div class="gameinfo">

<div id="turn">
Tur : 1
</div>

<div id="date">
1936
</div>

</div>

</header>

<main id="game">

<section id="map">

<div class="country uk" onclick="selectCountry('Birleşik Krallık')">
BK
</div>

<div class="country france" onclick="selectCountry('Fransa')">
Fransa
</div>

<div class="country germany" onclick="selectCountry('Almanya')">
Almanya
</div>

<div class="country austria" onclick="selectCountry('Avusturya')">
Avusturya
</div>

<div class="country italy" onclick="selectCountry('İtalya')">
İtalya
</div>

<div class="country serbia" onclick="selectCountry('Sırbistan')">
Sırbistan
</div>

<div class="country russia" onclick="selectCountry('Rusya')">
Rusya
</div>

<div id="vatican" onclick="selectCountry('Vatikan')">
✝
</div>

</section>

<aside id="panel">

<h2 id="countryName">
Vatikan
</h2>

<div class="stats">

<p>💰 Altın : <span id="gold">25</span>M</p>

<p>⭐ Nüfuz : <span id="power">95</span></p>

<p>⚔ Ordu : <span id="army">4</span></p>

<p>🏛 Diplomasi : <span id="diplo">80</span></p>

</div>

<div id="info">

Avrupa savaşa hazırlanıyor...

</div>

<div class="buttons">

<button onclick="nextTurn()">

Sonraki Tur

</button>

</div>

</aside>

</main>

<script src="script.js"></script>

</body>

</html>
